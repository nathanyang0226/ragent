name: Java Static Analysis

on:
  push:
    branches:
      - chore/static-analysis
      - master
      - develop
  pull_request:
    branches:
      - chore/static-analysis
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up JDK 17 with Maven cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Show Java and Maven version
        run: |
          java -version
          mvn -version

      - name: Clean and compile
        run: mvn -B clean compile -DskipTests

      - name: Run unit tests
        run: mvn -B test

      - name: Run Checkstyle
        run: mvn -B checkstyle:checkstyle -Dfile.encoding=UTF-8

      - name: Run PMD
        run: mvn -B pmd:pmd

      - name: Run SpotBugs + Find Security Bugs
        run: mvn -B spotbugs:spotbugs

      - name: Run OWASP Dependency-Check update
        run: mvn -B org.owasp:dependency-check-maven:update-only -DassemblyAnalyzerEnabled=false

      - name: Run OWASP Dependency-Check scan
        run: mvn -B dependency-check:check -DassemblyAnalyzerEnabled=false

      - name: Upload Checkstyle reports
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: |
            **/target/checkstyle-result.xml
            **/target/site/checkstyle.html
          retention-days: 7
          if-no-files-found: warn

      - name: Upload PMD reports
        uses: actions/upload-artifact@v4
        with:
          name: pmd-reports
          path: |
            **/target/pmd.xml
            **/target/site/pmd.html
          retention-days: 7
          if-no-files-found: warn

      - name: Upload SpotBugs reports
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: |
            **/target/spotbugsXml.xml
            **/target/site/spotbugs.html
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Dependency-Check reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: |
            **/target/dependency-check-report.html
            **/target/dependency-check-report.xml
            **/target/dependency-check-report.json
          retention-days: 7
          if-no-files-found: warn