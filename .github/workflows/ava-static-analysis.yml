name: Java Static Analysis

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up JDK 17 with Maven cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Show Java and Maven version
        run: |
          java -version
          mvn -version

      - name: Run static analysis tools
        run: |
          # 运行 Checkstyle
          mvn checkstyle:checkstyle -DskipTests
          
          # 运行 PMD
          mvn pmd:pmd -DskipTests
          
          # 运行 SpotBugs + Find Security Bugs
          mvn spotbugs:spotbugs -DskipTests
          
          # 更新并扫描 OWASP Dependency-Check
          mvn org.owasp:dependency-check-maven:update-only -DskipTests
          mvn dependency-check:check -DskipTests

      - name: Upload Checkstyle reports
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: |
            target/checkstyle-result.xml
            target/site/checkstyle.html
          retention-days: 7
          if-no-files-found: warn

      - name: Upload PMD reports
        uses: actions/upload-artifact@v4
        with:
          name: pmd-reports
          path: |
            target/pmd.xml
            target/site/pmd.html
          retention-days: 7
          if-no-files-found: warn

      - name: Upload SpotBugs reports
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: |
            target/spotbugsXml.xml
            target/site/spotbugs.html
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Dependency-Check reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.xml
            target/dependency-check-report.json
          retention-days: 7
          if-no-files-found: warn